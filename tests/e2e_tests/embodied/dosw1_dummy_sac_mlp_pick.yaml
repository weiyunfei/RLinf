defaults:
  - env/dosw1_pick@env.train
  - env/dosw1_pick@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: /workspace/results/dosw1_dummy_sac_mlp_pick
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: always
  gamma: 0.8
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -14
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 100
    sample_window_size: 100
    min_buffer_size: 0
    auto_save: True

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 14
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      camera_serials: []
      use_dense_reward: True
      max_num_steps: 10
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 10
    max_steps_per_rollout_epoch: 10

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: true
      camera_serials: []

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 256
  global_batch_size: 256
  seed: 1234
  enable_offload: False

  model:
    model_type: mlp_policy
    model_path: ""
    action_dim: 14
    obs_dim: 14
    image_num: 0
    precision: "32"
    add_value_head: False
    add_q_head: True

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
